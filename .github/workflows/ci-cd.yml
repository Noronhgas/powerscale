name: CI-CD PowerScale

on:
  push:
    branches:
      - develop
      - "feature/**"

  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  qualidade-testes:
    name: Qualidade, testes e cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar análise estática com ESLint
        run: npm run lint

      - name: Rodar testes unitários, API e cobertura
        run: npm test

      - name: Configurar Google Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Rodar teste de interface com Selenium
        run: npm run test:e2e

      - name: Verificar vulnerabilidades nas dependências
        run: npm audit --audit-level=high || true

  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: qualidade-testes

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t powerscale .