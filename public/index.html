<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PowerScale</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>PowerScale</h1>

      <p class="descricao">
        Calculadora de nível de poder de personagem
      </p>

      <form id="form-personagem">
        <div class="campo">
          <label for="nome">Nome do personagem</label>
          <input 
            type="text" 
            id="nome" 
            placeholder="Ex: Nicolas" 
            required
          />
        </div>

        <div class="campo">
          <label for="nivelPoder">Nível de poder</label>
          <input 
            type="number" 
            id="nivelPoder" 
            placeholder="Ex: 500" 
            required
          />
        </div>

        <div class="campo">
          <label for="idade">Idade</label>
          <input 
            type="number" 
            id="idade" 
            placeholder="Ex: 20" 
            required
          />
        </div>

        <div class="campo">
          <label for="raca">Raça</label>
          <select id="raca" required>
            <option value="">Selecione uma raça</option>
            <option value="humano">Humano</option>
            <option value="elfo">Elfo</option>
            <option value="anjo">Anjo</option>
            <option value="alien">Alien</option>
            <option value="espirito">Espírito</option>
          </select>
        </div>

        <button type="submit" id="calcular">
          Calcular nível
        </button>
      </form>

      <div id="resultado" class="resultado"></div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
